<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="Styles.css">
  <title>Call App by SrK</title>
</head>
<body>
  <div class="form-container">
    <form>
      <h2>Call App</h2>
      <!--Image here-->
      <label for="imageUrl">Image URL</label><br>
      <input type="text" placeholder="https://example.com/photo.jpg">
      <!--name here-->
      <label for="name">Full Name</label><br>
      <input type="text" placeholder="Enter full name">
      <!--city here-->
      <label for="city">Home Town</label><br>
      <input type="text" placeholder="Enter home town">
      <!--purpose here-->
      <label for="purpose">Purpose</label><br>
      <input type="text" placeholder="e.g. Quick appointment call">
      <!--here are the radio buttons for selection-->
      <label for="select">Categories</label>
      <input type="radio" placeholder="Emergency">
      <input type="radio" placeholder="Important">
      <input type="radio" placeholder="Urgent">
      <input type="radio" placeholder="No Rush">
      <!--buttons here-->
      <button id="creatBtn">Create Note</button>
      <button id="closeBtn">Close</button>
      
    </form>
  </div>
  <div class="stack">
    <div class="cards"></div>
  </div>
  <script src="Script.js"></script>
</body>
</html>
