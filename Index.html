<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="Styles.css">
  <title>Call App by SrK</title>
</head>
<body>
  <div class="form-container">
    <form>
      <h2>Call App</h2>
      <!--Image here-->
      <label for="imageUrl">Image Url</label><br>
      <input type="text" placeholder="Enter Image Url">
      <!--name here-->
      <label for="name">Enter Name</label><br>
      <input type="text" placeholder="Enter Name">
      <!--city here-->
      <label for="city">Enter City</label><br>
      <input type="text" placeholder="Enter City">
      <!--purpose here-->
      <label for="purpose">Enter Purpose</label><br>
      <input type="text" placeholder="Enter Purpose">
      <!--here are the radio buttons for selection-->
      <label for="select">Categories</label>
      <input type="radio" placeholder="Emergency">
      <input type="radio" placeholder="Important">
      <input type="radio" placeholder="Urgent">
      <input type="radio" placeholder="No Rush">
    </form>
  </div>
  <div class="stack">
    <div class="cards"></div>
  </div>
  <script src="Script.js"></script>
</body>
</html>
