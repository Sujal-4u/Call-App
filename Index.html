<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="Styles.css">
  <title>Call App by SrK</title>
</head>
<body>
  <div class="form-container">
    <form>
      <h2>Call App</h2>
      <!--Image here-->
      <label for="imageUrl">Image URL</label><br>
      <input required class="inp" type="text" placeholder="https://example.com/photo.jpg"><br><br>
      <!--name here-->
      <label for="name">Full Name</label><br>
      <input required class="inp" type="text" placeholder="Enter full name"><br><br>
      <!--city here-->
      <label for="city">Home Town</label><br>
      <input  type="text" required class="inp"  placeholder="Enter home town"><br><br>
      <!--purpose here-->
      <label for="purpose">Purpose</label><br>
      <input type="text" class="inp" required placeholder="e.g. Quick appointment call"><br><br>
      <!--here are the radio buttons for selection-->
      <label  for="select">Categories</label><br><br>
      <input required type="radio" id="emergency" name="category" value="Emergency">
      <label for="emergency">Emergency</label><br>

      <input type="radio" id="important" name="category" value="Important">
      <label for="important">Important</label><br>

      <input type="radio" id="urgent" name="category" value="Urgent">
      <label for="urgent">Urgent</label><br>

      <input type="radio" id="no-rush" name="category" value="No Rush">
      <label for="no-rush">No Rush</label><br><br>

      <!--buttons here-->
      <button class="form-btn" id="creatBtn">Create Note</button><br><br>
      <button class="form-btn" id="closeBtn">Close</button>
      
    </form>
  </div>
  <div class="note-container">
    <div class="left-icons">
      <div class="addBtn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><path d="M256 64c0-17.7-14.3-32-32-32s-32 14.3-32 32l0 160-160 0c-17.7 0-32 14.3-32 32s14.3 32 32 32l160 0 0 160c0 17.7 14.3 32 32 32s32-14.3 32-32l0-160 160 0c17.7 0 32-14.3 32-32s-14.3-32-32-32l-160 0 0-160z"/></svg>
      </div>
      <div id="upBtn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512"><path d="M169.4 137.4c12.5-12.5 32.8-12.5 45.3 0l160 160c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L192 205.3 54.6 342.6c-12.5 12.5-32.8 12.5-45.3 0s-12.5-32.8 0-45.3l160-160z"/></svg>
      </div>
      <div id="downBtn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512"><path d="M169.4 374.6c12.5 12.5 32.8 12.5 45.3 0l160-160c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192 306.7 54.6 169.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3l160 160z"/></svg>
      </div>
    </div>
    <div class="stack">
      <div class="cards">
        <img src="https://i.pinimg.com/236x/f4/96/ff/f496ffcd0c99798743d1be81d972a815.jpg">
        <h2>Sujal</h2>
        <div class="info" id="address">
          <p>Home Town</p>
          <p>Singapur</p>
        </div>
        <div class="info" id="purpose">
          <p>Booking</p>
          <p>Urgent meeting</p>
        </div>
        <div class="action-btn">
          <button class="action" id="callBtn">Call</button><br>
          <button class="action" id="msgBtn">Message</button>
        </div>
      </div>
    </div>
    <div class="cards">
        <img src="https://i.pinimg.com/236x/f4/96/ff/f496ffcd0c99798743d1be81d972a815.jpg">
        <h2>Sujal</h2>
        <div class="info" id="address">
          <p>Home Town</p>
          <p>Singapur</p>
        </div>
        <div class="info" id="purpose">
          <p>Booking</p>
          <p>Urgent meeting</p>
        </div>
        <div class="action-btn">
          <button class="action" id="callBtn">Call</button><br>
          <button class="action" id="msgBtn">Message</button>
        </div>
      </div>
    </div>
    <div class="cards">
        <img src="https://i.pinimg.com/236x/f4/96/ff/f496ffcd0c99798743d1be81d972a815.jpg">
        <h2>Sujal</h2>
        <div class="info" id="address">
          <p>Home Town</p>
          <p>Singapur</p>
        </div>
        <div class="info" id="purpose">
          <p>Booking</p>
          <p>Urgent meeting</p>
        </div>
        <div class="action-btn">
          <button class="action" id="callBtn">Call</button><br>
          <button class="action" id="msgBtn">Message</button>
        </div>
      </div>
    </div>
    <div class="right-colors">
      <div id="black" class="color"></div>
      <div id="purple" class="color"></div>
      <div id="orange" class="color"></div>
      <div id="green" class="color"></div>
    </div>
  </div>
  <script src="Script.js"></script>
</body>
</html>
